<!-- index.html (テスト表示用テンプレート) -->

<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="{{ site_name }}">
    <meta property="og:description" content="{% block og_description %}flask-templateページの要約{% endblock %}">
    <meta property="og:title" content="{% block og_title %}{{ site_name }}{% endblock %}">
    <meta property="og:image" content="{{ site_root_url }}{{ static_url('image/thumbnail.png') }}">


    <meta property="og:url" content="{{ static_url('routes_index.index') }}">
    <meta property="og:type" content="website">
    <meta name="csrf-token" content="{{ csrf_token() }}">


    <title>{% block title %}{{ site_name }}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="{{ static_url('css/index.css') }}">

    <!-- Favicon -->
    <link rel="icon" href="{{ site_root_url }}{{ static_url('image/favicon.png') }}">
    
</head>

<body>

    <h1>Hello World</h1>

    <!-- JavaScript読み込み -->
    <script src="{{ static_url('js/script.js') }}"></script>

    <div id="global-config" data-base-path="{{ base_path }}" data-site-root-url="{{ site_root_url }}">
    </div>

</body>

</html>
